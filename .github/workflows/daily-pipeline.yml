name: Daily Support Scraper & Gemini Sync

on:
  schedule:
    # Runs at 19:00 UTC everyday (02:00 AM Indochina Time/Vietnam Time)
    - cron: '0 19 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scrape & Upload Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPPORT_BASE_URL: "https://support.optisigns.com"
        OUTPUT_DIR: "articles"
        HASH_STORE_FILE: "article_hashes.json"
        UPLOAD_HASHES_FILE: "upload_hashes.json"
      run: |
        python main.py | tee pipeline.log

    - name: Generate Job Summary
      if: always()
      run: |
        python -c '
        import re, os
        try:
            if not os.path.exists("pipeline.log"):
                print("Log file not found")
                exit(0)
            with open("pipeline.log", "r", encoding="utf-8") as f:
                log_content = f.read()
            
            # Find summaries
            scrape_match = re.search(r"Scrape - Fetched: (\d+), Added: (\d+), Updated: (\d+), Skipped: (\d+), Errors: (\d+)", log_content)
            upload_match = re.search(r"Upload - Uploaded: (\d+), Skipped: (\d+), Errors: (\d+)", log_content)
            
            summary_md = "## Pipeline Run Summary\n\n"
            
            if scrape_match:
                f_count, a_count, u_count, s_count, e_count = scrape_match.groups()
                summary_md += "### Zendesk Scraper\n"
                summary_md += f"| Metric | Count |\n|---|---|\n"
                summary_md += f"| Total Fetched | {f_count} |\n"
                summary_md += f"| Added (New) | **{a_count}** |\n"
                summary_md += f"| Updated | **{u_count}** |\n"
                summary_md += f"| Skipped | {s_count} |\n"
                summary_md += f"| Errors | {e_count} |\n\n"
            
            if upload_match:
                up_count, sk_count, err_count = upload_match.groups()
                summary_md += "### Gemini File Search Uploader\n"
                summary_md += f"| Metric | Count |\n|---|---|\n"
                summary_md += f"| Uploaded (New/Updated) | **{up_count}** |\n"
                summary_md += f"| Skipped (Unchanged) | {sk_count} |\n"
                summary_md += f"| Errors | {err_count} |\n\n"
            
            # Write to Step Summary
            summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
            if summary_file:
                with open(summary_file, "a", encoding="utf-8") as sf:
                    sf.write(summary_md)
        except Exception as ex:
            print("Failed to generate summary:", ex)
        '

    - name: Commit and Push Delta Cache Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -f article_hashes.json upload_hashes.json
        git commit -m "chore: auto-update delta sync cache files [skip ci]" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref }}
